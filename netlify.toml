# ── Build ──────────────────────────────────────────────────────────────────────
[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"

# ── Next.js plugin ─────────────────────────────────────────────────────────────
[[plugins]]
  package = "@netlify/plugin-nextjs"

# ── 301: non-www → www ─────────────────────────────────────────────────────────
[[redirects]]
  from    = "https://gbprojectconcept.fr/*"
  to      = "https://www.gbprojectconcept.fr/:splat"
  status  = 301
  force   = true

# ── HTTP → HTTPS (на случай если Netlify не делает это автоматически) ──────────
[[redirects]]
  from    = "http://gbprojectconcept.fr/*"
  to      = "https://www.gbprojectconcept.fr/:splat"
  status  = 301
  force   = true

[[redirects]]
  from    = "http://www.gbprojectconcept.fr/*"
  to      = "https://www.gbprojectconcept.fr/:splat"
  status  = 301
  force   = true
